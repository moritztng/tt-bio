name: ci

# Host-only checks. TT hardware is not available on GitHub runners, so device/parity
# tests are NOT run here — they gate releases on real cards before a tag is cut.
# This job proves the package builds, is publishable, and imports without a card.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
      - name: Check package metadata
        run: python -m twine check dist/*
      - name: Import check (no card, no heavy deps)
        run: |
          python -m pip install --no-deps dist/*.whl
          python -c "import tt_bio; print('tt_bio', tt_bio.__version__)"
