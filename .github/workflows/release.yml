name: release

# Cut a release by pushing a version tag AFTER the on-hardware test suite is green:
#   git tag v0.2.0 && git push origin v0.2.0
# This builds the artifacts, publishes a GitHub Release with notes + wheel, and
# (once enabled) publishes to PyPI via Trusted Publishing.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Tag must match pyproject version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          ver="$(python -c "import tomllib;print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [ "$tag" != "$ver" ]; then
            echo "::error::tag v$tag != pyproject version $ver"; exit 1
          fi
      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Create GitHub Release (notes from CHANGELOG section)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${GITHUB_REF_NAME#v}"
          # Pull the matching section out of CHANGELOG.md; fall back to autogenerated notes.
          awk -v v="$ver" '/^## /{p=($0 ~ "\\["v"\\]")} p' CHANGELOG.md > NOTES.md || true
          if [ -s NOTES.md ]; then
            gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes-file NOTES.md
          else
            gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --generate-notes
          fi

  pypi-publish:
    needs: build
    runs-on: ubuntu-latest
    # Publishes via PyPI Trusted Publishing (no stored token). Needs a one-time PyPI
    # Trusted Publisher for this repo + the "pypi" environment (see RELEASING.md); set it
    # up before the first tag. Until it exists this job fails harmlessly — the GitHub
    # Release above still publishes.
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
