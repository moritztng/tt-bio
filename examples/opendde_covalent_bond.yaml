version: 1
# Covalent bond constraint for OpenDDE (protein-protein subset).
# OpenDDE is protein-only today, so BOTH bond endpoints must be protein residues.
# This example puts a disulfide-style covalent crosslink between Cys7 on chain A
# and Cys5 on chain B. atom1/atom2 are [chain_id, residue_1indexed, atom_name].
# Fold with:  tt-bio predict examples/opendde_covalent_bond.yaml --model opendde
# (pocket/contact constraints are NOT supported by OpenDDE/Protenix-v2 -- use --model boltz2.)
sequences:
  - protein:
      id: A
      sequence: GCGSQWDRSGR
  - protein:
      id: B
      sequence: NKLCGHEITWD
constraints:
  - bond:
      atom1: [A, 7, SG]
      atom2: [B, 5, SG]
